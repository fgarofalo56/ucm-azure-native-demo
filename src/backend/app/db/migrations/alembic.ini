[alembic]
script_location = .
sqlalchemy.url = mssql+aioodbc:///?odbc_connect=Driver={ODBC Driver 18 for SQL Server};Server=tcp:localhost,1433;Database=assurancenet;Encrypt=yes;TrustServerCertificate=yes

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
