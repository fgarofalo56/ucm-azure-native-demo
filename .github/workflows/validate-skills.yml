name: Validate Skills

on:
  push:
    branches: [master, main]
    paths:
      - 'skills/**'
      - 'scripts/validate_skills.py'
      - '.github/workflows/validate-skills.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'skills/**'
      - 'scripts/validate_skills.py'
      - '.github/workflows/validate-skills.yml'
  workflow_dispatch:  # Allow manual trigger

jobs:
  validate:
    name: Validate Skills
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML

      - name: Validate all skills
        run: python scripts/validate_skills.py --verbose

      - name: Validate skills (strict mode)
        run: python scripts/validate_skills.py --strict
        continue-on-error: true  # Warnings shouldn't fail the build, just report

      - name: Generate validation report
        if: always()
        run: |
          echo "## Skill Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python scripts/validate_skills.py --json | python -c "
          import sys, json
          data = json.load(sys.stdin)
          print(f\"- **Total Skills:** {data['total_skills']}\")
          print(f\"- **Valid:** {data['valid_skills']}\")
          print(f\"- **Invalid:** {data['invalid_skills']}\")
          print(f\"- **Errors:** {data['total_errors']}\")
          print(f\"- **Warnings:** {data['total_warnings']}\")
          " >> $GITHUB_STEP_SUMMARY

  lint-python:
    name: Lint Python Scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Lint Python files
        run: |
          ruff check scripts/ --output-format=github
          ruff check skills/**/scripts/ --output-format=github || true
        continue-on-error: true  # Don't fail on lint warnings

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=scripts --cov-report=term-missing --cov-report=html
        continue-on-error: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: htmlcov/

  check-yaml:
    name: Validate YAML Syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: pip install PyYAML

      - name: Check YAML syntax in all SKILL.md files
        run: |
          python << 'EOF'
          import sys
          import yaml
          from pathlib import Path

          skills_dir = Path('skills')
          errors = []

          for skill_md in skills_dir.glob('**/SKILL.md'):
              content = skill_md.read_text()
              if not content.startswith('---'):
                  errors.append(f"{skill_md}: Missing frontmatter")
                  continue

              lines = content.split('\n')
              try:
                  end_idx = next(i for i, l in enumerate(lines[1:], 1) if l.strip() == '---')
                  yaml_content = '\n'.join(lines[1:end_idx])
                  yaml.safe_load(yaml_content)
                  print(f"OK: {skill_md}")
              except Exception as e:
                  errors.append(f"{skill_md}: {e}")

          if errors:
              print("\nYAML Errors:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)
          else:
              print(f"\nAll {len(list(skills_dir.glob('**/SKILL.md')))} SKILL.md files have valid YAML")
          EOF
