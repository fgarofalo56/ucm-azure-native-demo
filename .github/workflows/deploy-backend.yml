name: Deploy Backend

on:
  push:
    branches: [main]
    paths: ['src/backend/**']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: acrassurancenetdev
  CONTAINER_APP_NAME: ca-api-assurancenet-dev
  RESOURCE_GROUP: rg-assurancenet-app-dev
  IMAGE_NAME: assurancenet-api

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: src/backend
        run: |
          pip install -e ".[dev]"

      - name: Lint with ruff
        working-directory: src/backend
        run: ruff check .

      - name: Type check with mypy
        working-directory: src/backend
        run: mypy app/ --ignore-missing-imports

      - name: Run tests
        working-directory: src/backend
        run: pytest --cov=app --cov-report=xml --cov-fail-under=80
        env:
          ENVIRONMENT: test

  deploy-dev:
    name: Deploy to Dev
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --image ${{ env.IMAGE_NAME }}:latest \
            --file src/backend/Dockerfile \
            src/backend/

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Smoke test
        run: |
          sleep 30
          curl -f https://ca-api-assurancenet-dev.reddune-5bb251d3.eastus2.azurecontainerapps.io/api/v1/health || exit 1
