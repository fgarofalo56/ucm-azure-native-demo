name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    name: Validate Repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          echo "Validating JSON files..."
          find . -name "*.json" -not -path "*/node_modules/*" -not -path "*/.vscode/*" -not -path "*/dist/*" -type f | while read file; do
            echo "Checking: $file"
            python3 -m json.tool "$file" > /dev/null || { echo "Invalid JSON: $file"; exit 1; }
          done
          echo "All JSON files are valid"

      - name: Validate YAML files
        run: |
          pip install yamllint
          yamllint -d relaxed . || true

      - name: Check required files
        run: |
          for file in CLAUDE.md README.md; do
            if [ -f "$file" ]; then
              echo "Found: $file"
            else
              echo "Warning: $file not found"
            fi
          done

  lint-backend:
    name: Lint Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd src/backend
          pip install -e ".[dev]"

      - name: Run ruff linter
        run: |
          cd src/backend
          ruff check app/

      - name: Run ruff formatter check
        run: |
          cd src/backend
          ruff format --check app/

      - name: Run mypy type checking
        run: |
          cd src/backend
          mypy app/ --ignore-missing-imports

  lint-frontend:
    name: Lint Frontend (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd src/frontend
          npm install

      - name: Run ESLint
        run: |
          cd src/frontend
          npm run lint

      - name: Run TypeScript compiler check
        run: |
          cd src/frontend
          npm run typecheck

  lint-bicep:
    name: Lint Bicep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep
          sudo mv bicep /usr/local/bin/

      - name: Lint Bicep modules
        run: |
          find infra/ -name "*.bicep" -type f | while read file; do
            echo "Linting: $file"
            bicep lint "$file" || true
          done

      - name: Build Bicep (validate syntax)
        run: |
          bicep build infra/main.bicep --stdout > /dev/null

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd src/backend
          pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: |
          cd src/backend
          pytest ../../tests/backend/ --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=80 -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: src/backend/coverage.xml

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd src/frontend
          npm install

      - name: Run vitest with coverage
        run: |
          cd src/frontend
          npx vitest run --coverage

  test-functions:
    name: Test Functions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r src/functions/requirements.txt
          pip install pytest pytest-cov

      - name: Run pytest
        run: |
          PYTHONPATH=src/functions pytest tests/functions/ -v

  security-sast:
    name: Security - SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python, javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  security-deps:
    name: Security - Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          cd src/backend
          pip-audit . || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit npm dependencies
        run: |
          cd src/frontend
          npm install --ignore-scripts
          npm audit --audit-level=high || true

  security-secrets:
    name: Security - Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  infra-validate:
    name: Validate Infrastructure
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep
          sudo mv bicep /usr/local/bin/

      - name: Build all Bicep files
        run: |
          find infra/ -name "*.bicep" -type f | while read file; do
            echo "Building: $file"
            bicep build "$file" --stdout > /dev/null
          done

      - name: Azure Login (for what-if)
        if: env.AZURE_CLIENT_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

      - name: Run what-if deployment
        if: env.AZURE_CLIENT_ID != ''
        run: |
          az deployment sub what-if \
            --location eastus \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.bicepparam
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
